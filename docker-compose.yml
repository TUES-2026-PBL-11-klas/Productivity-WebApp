version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: productivity_db
    environment:
      POSTGRES_DB: ${DB_NAME:-productivity}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    image: yourdockerhubusername/productivity-backend:latest
    container_name: productivity_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-productivity}
    depends_on:
      db:
        condition: service_healthy
  frontend:
    build: ./frontend
    image: yourdockerhubusername/productivity-frontend:latest
    container_name: productivity_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://backend:8000

volumes:
  postgres_data:
